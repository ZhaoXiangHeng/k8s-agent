apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      serviceAccountName: k8s-ai-backend
      containers:
        - name: backend-api
          image: {{ include "k8s-ai-ops.image" (list . .Values.backend.image.repository) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: MCP_SERVER_URL
              value: "http://mcp-server:8081"
            - name: AGENT_SERVER_ADDR
              value: "agent-server:8082"
            - name: STORE_DRIVER
              value: {{ .Values.backend.storeDriver | quote }}
            - name: CACHE_DRIVER
              value: {{ .Values.backend.cacheDriver | quote }}
            - name: K8S_RBAC_SYNC_ENABLED
              value: {{ .Values.backend.rbacSyncEnabled | quote }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@postgresql:5432/{{ .Values.postgresql.database }}?sslmode=disable"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-ai-secrets
                  key: APP_ENCRYPTION_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: backend-api
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8080
