apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      serviceAccountName: k8s-ai-backend
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql {{ .Values.postgresql.service.port }}; do
                echo "waiting for postgresql..."
                sleep 2
              done
        {{- if .Values.redis.enabled }}
        - name: wait-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis {{ .Values.redis.service.port }}; do
                echo "waiting for redis..."
                sleep 2
              done
        {{- end }}
      {{- end }}
      containers:
        - name: backend-api
          image: {{ include "k8s-ai-ops.image" (list . .Values.backend.image.repository) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8082
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: GRPC_ADDR
              value: ":8082"
            - name: AGENT_SERVER_ADDR
              value: "agent-server:8082"
            - name: STORE_DRIVER
              value: {{ .Values.backend.storeDriver | quote }}
            - name: CACHE_DRIVER
              value: {{ .Values.backend.cacheDriver | quote }}
            - name: K8S_RBAC_SYNC_ENABLED
              value: {{ .Values.backend.rbacSyncEnabled | quote }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@postgresql:{{ .Values.postgresql.service.port }}/{{ .Values.postgresql.database }}?sslmode=disable"
            - name: REDIS_ADDR
              value: "redis:{{ .Values.redis.service.port }}"
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-ai-secrets
                  key: APP_ENCRYPTION_KEY
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: backend-api
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8080
    - name: grpc
      port: {{ .Values.backend.service.grpcPort }}
      targetPort: 8082
