apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: {{ include "k8s-ai-ops.image" (list . .Values.mcpServer.image.repository) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: HTTP_ADDR
              value: ":8081"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: mcp-server
  ports:
    - port: {{ .Values.mcpServer.service.port }}
      targetPort: 8081
