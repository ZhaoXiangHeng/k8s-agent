apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      initContainers:
        - name: wait-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z backend-api {{ .Values.backend.service.grpcPort }}; do
                echo "waiting for backend gRPC..."
                sleep 2
              done
      containers:
        - name: mcp-server
          image: {{ include "k8s-ai-ops.image" (list . .Values.mcpServer.image.repository) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: HTTP_ADDR
              value: ":8081"
            - name: IDENTITY_SERVER_ADDR
              value: "backend-api:8082"
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: mcp-server
  ports:
    - port: {{ .Values.mcpServer.service.port }}
      targetPort: 8081
