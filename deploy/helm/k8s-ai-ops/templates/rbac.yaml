apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-backend
  namespace: {{ .Values.global.namespace }}
{{- range .Values.rbac.managedNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-ai-backend-rbac-manager
  namespace: {{ . }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-ai-backend-rbac-manager
  namespace: {{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8s-ai-backend-rbac-manager
subjects:
  - kind: ServiceAccount
    name: k8s-ai-backend
    namespace: {{ $.Values.global.namespace }}
{{- end }}
