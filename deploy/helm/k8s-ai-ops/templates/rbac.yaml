apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-backend
  namespace: {{ .Values.global.namespace }}
{{- if .Values.rbac.adminServiceAccount.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.adminServiceAccount.name }}
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.rbac.adminServiceAccount.name }}-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.adminServiceAccount.name }}
    namespace: {{ .Values.global.namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.rbac.adminServiceAccount.name }}-token
  namespace: {{ .Values.global.namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ .Values.rbac.adminServiceAccount.name }}
type: kubernetes.io/service-account-token
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-backend-rbac-manager
  labels:
    app.kubernetes.io/name: k8s-ai-ops
    app.kubernetes.io/managed-by: k8s-ai-ops-backend
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-backend-rbac-manager
  labels:
    app.kubernetes.io/name: k8s-ai-ops
    app.kubernetes.io/managed-by: k8s-ai-ops-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-backend-rbac-manager
subjects:
  - kind: ServiceAccount
    name: k8s-ai-backend
    namespace: {{ .Values.global.namespace }}
