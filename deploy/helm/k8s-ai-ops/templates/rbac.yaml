apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-backend
  namespace: {{ .Values.global.namespace }}
{{- if .Values.rbac.adminServiceAccount.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.adminServiceAccount.name }}
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.rbac.adminServiceAccount.name }}-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.adminServiceAccount.name }}
    namespace: {{ .Values.global.namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.rbac.adminServiceAccount.name }}-token
  namespace: {{ .Values.global.namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ .Values.rbac.adminServiceAccount.name }}
type: kubernetes.io/service-account-token
{{- end }}
{{- range .Values.rbac.managedNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-ai-backend-rbac-manager
  namespace: {{ . }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-ai-backend-rbac-manager
  namespace: {{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8s-ai-backend-rbac-manager
subjects:
  - kind: ServiceAccount
    name: k8s-ai-backend
    namespace: {{ $.Values.global.namespace }}
{{- end }}
