{{- if .Values.traefik.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.global.namespace }}-traefik
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "nodes", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps", "middlewares", "middlewaretcps", "serverstransports", "serverstransporttcps", "tlsoptions", "tlsstores", "traefikservices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.global.namespace }}-traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.global.namespace }}-traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: {{ .Values.global.namespace }}
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
spec:
  controller: traefik.io/ingress-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-traefik
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api-gateway-traefik
  template:
    metadata:
      labels:
        app: api-gateway-traefik
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: {{ .Values.traefik.image }}
          args:
            - "--api.dashboard=false"
            - "--ping=true"
            - "--entrypoints.web.address=:8000"
            - "--entrypoints.traefik.address=:8080"
            - "--providers.kubernetescrd.namespaces={{ .Values.global.namespace }}"
            - "--providers.kubernetescrd.allowCrossNamespace=false"
          ports:
            - name: web
              containerPort: 8000
              hostPort: {{ .Values.traefik.hostPort }}
            - name: traefik
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-traefik
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: api-gateway-traefik
  ports:
    - name: web
      port: 80
      targetPort: 8000
    - name: traefik
      port: 8080
      targetPort: 8080
{{- end }}
