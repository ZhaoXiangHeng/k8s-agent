syntax = "proto3";

package agent.v1;

option go_package = "k8s-ai-ops/proto/agent/v1;agentv1";

service AgentService {
  rpc RunStream(AgentRunRequest) returns (stream StreamEvent);
}

message AgentRunRequest {
  string request_id = 1;
  string session_id = 2;
  string message_id = 3;
  UserContext user = 4;
  ModelRuntimeConfig model = 5;
  repeated Message messages = 6;
  string message = 7;
  repeated Permission permissions = 8;
  repeated ToolRef tools = 9;
  RuntimeContext runtime_context = 10;
}

message UserContext {
  string id = 1;
  string username = 2;
}

message ModelRuntimeConfig {
  string provider_id = 1;
  string protocol = 2;
  string base_url = 3;
  string api_key = 4;
  string model_name = 5;
  bool supports_tools = 6;
  bool supports_streaming = 7;
}

message Message {
  string role = 1;
  string content = 2;
}

message Permission {
  string namespace = 1;
  string api_group = 2;
  string resource = 3;
  repeated string verbs = 4;
}

message ToolRef {
  string name = 1;
  string namespace = 2;
  string api_group = 3;
  string resource = 4;
  string verb = 5;
}

message RuntimeContext {
  string current_user = 1;
  repeated string allowed_namespaces = 2;
  repeated ResourceRef recent_resources = 3;
}

message ResourceRef {
  string kind = 1;
  string api_group = 2;
  string namespace = 3;
  string name = 4;
  string summary = 5;
}

// --- Streaming messages ---

message StreamEvent {
  string event_id = 1;
  int64 timestamp = 2;

  oneof event {
    ThinkingEvent   thinking    = 10;
    ToolCallEvent   tool_call   = 11;
    ToolResultEvent tool_result = 12;
    ResourceEvent   resource    = 13;
    CompleteEvent   complete    = 14;
    ErrorEvent      error       = 15;
  }
}

message ThinkingEvent {
  string content = 1;
}

message ToolCallEvent {
  string tool_name = 1;
  string arguments_json = 2;
}

message ToolResultEvent {
  string tool_name = 1;
  bool success = 2;
  string result_json = 3;
}

message ResourceEvent {
  ResourceResult resource = 1;
}

message CompleteEvent {
  string summary = 1;
  repeated ResourceResult resources = 2;
}

message ErrorEvent {
  string code = 1;
  string message = 2;
}

message ResourceResult {
  string kind = 1;
  string api_group = 2;
  string namespace = 3;
  string name = 4;
  string status = 5;
}
